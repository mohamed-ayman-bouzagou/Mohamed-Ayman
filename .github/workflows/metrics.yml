# ════════════════════════════════════════════════════════════
#  GitHub Action — Auto-update metrics SVG every day
#  📁 Mets ce fichier dans : .github/workflows/metrics.yml
# ════════════════════════════════════════════════════════════

name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"   # Tous les jours à minuit UTC
  workflow_dispatch:        # Peut être lancé manuellement
  push:
    branches: ["main", "master"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📊 Generate metrics SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: mohamed-ayman-bouzagou
          filename: metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Africa/Casablanca

          # ── Plugins activés ──────────────────────────────
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: lines, percentage
          plugin_languages_limit: 8

          plugin_stars: yes
          plugin_stars_limit: 3

          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          plugin_achievements: yes
          plugin_achievements_threshold: C

          plugin_traffic: yes
